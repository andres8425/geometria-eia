    <div class="diapositiva">
        <h1>Capítulo 1: Rectas y Segmentos</h1>

        <div class="academic-box definicion" data-title="DEFINICIÓN">
            <p>Dados dos puntos \(A\) y \(B\), el segmento \(\overline{AB}\) es el conjunto de puntos que incluye a \(A\), \(B\) y todos los puntos entre ellos. La medida se denota como \(AB\).</p>
        </div>

        <div class="canvas-simulador">
            </div>

        <div class="academic-box proposicion" data-title="PROPOSICIÓN">
            <p>El punto \(M\) es el punto medio de \(\overline{AB}\) si \(AM = MB = \frac{AB}{2}\).</p>
        </div>
    </div>
